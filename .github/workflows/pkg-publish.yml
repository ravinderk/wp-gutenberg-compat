name: '[NPM Package] Publish'

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-publish
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: master

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: 'https://registry.npmjs.org'
                  scope: '@ravi.nder'

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run pkg:test

            - name: Publish to npm
              run: npm publish --workspace=projects/npm-packages --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
