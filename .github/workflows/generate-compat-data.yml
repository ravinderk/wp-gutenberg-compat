name: Generate Compat Data

on:
    schedule:
        - cron: '0 6 * * *' # Daily at 06:00 UTC
    workflow_dispatch:
        inputs:
            force_refresh:
                description: 'Delete compat-data.json and regenerate all entries from scratch'
                required: false
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Force refresh compat data
              if: inputs.force_refresh == 'true'
              run: rm -f src/data/compat-data.json

            - name: Run scraper
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: node scripts/generate.js

            - name: Check for changes
              id: diff
              run: |
                  git diff --quiet src/data/compat-data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

            - name: Read latest tag from data
              if: steps.diff.outputs.changed == 'true'
              id: tag
              run: |
                  TAG=$(node -e "const d=require('./src/data/compat-data.json'); console.log(d.lastGutenbergTag)")
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Commit updated compat data
              if: steps.diff.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add src/data/compat-data.json
                  git commit -m "chore(data): update compat data for Gutenberg ${{ steps.tag.outputs.tag }}"
                  git push
