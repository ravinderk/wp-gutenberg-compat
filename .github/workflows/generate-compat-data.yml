name: Generate Compat Data

on:
    schedule:
        - cron: '0 6 * * *' # Daily at 06:00 UTC
    workflow_dispatch:
        inputs:
            dry_run:
                description: 'Dry run — scrape data and report changes without creating a branch or PR'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'false'
                    - 'true'

permissions:
    contents: write
    pull-requests: write

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run scraper
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: node scripts/generate.js

            - name: Check for changes
              id: diff
              run: |
                  git diff --quiet src/data/compat-data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

            - name: Read latest tag from data
              if: steps.diff.outputs.changed == 'true'
              id: tag
              run: |
                  TAG=$(node -e "const d=require('./src/data/compat-data.json'); console.log(d.lastGutenbergTag)")
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Dry run report
              if: steps.diff.outputs.changed == 'true' && inputs.dry_run == 'true'
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  echo "## Dry Run Report" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "**Mode:** Dry Run — no branch or PR was created." >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "### What would happen" >> "$GITHUB_STEP_SUMMARY"
                  echo "- A new branch \`chore/update-compat-data-${TAG}\` would be created." >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`src/data/compat-data.json\` would be committed with the updated compat data for Gutenberg **${TAG}**." >> "$GITHUB_STEP_SUMMARY"
                  echo "- A pull request would be opened targeting \`master\` and assigned to **ravinderk** for review." >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "### Diff preview" >> "$GITHUB_STEP_SUMMARY"
                  echo '```diff' >> "$GITHUB_STEP_SUMMARY"
                  git diff src/data/compat-data.json >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"

            - name: No changes report
              if: steps.diff.outputs.changed == 'false' && inputs.dry_run == 'true'
              run: |
                  echo "## Dry Run Report" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "**Mode:** Dry Run — no changes detected." >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "\`src/data/compat-data.json\` is already up to date. No branch or PR would be created." >> "$GITHUB_STEP_SUMMARY"

            - name: Create branch and commit updated compat data
              if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
              id: commit
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  BRANCH="chore/update-compat-data-${{ steps.tag.outputs.tag }}"
                  git checkout -b "$BRANCH"
                  git add src/data/compat-data.json
                  git commit -m "chore(data): update compat data for Gutenberg ${{ steps.tag.outputs.tag }}"
                  git push origin "$BRANCH"
                  echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

            - name: Open pull request
              if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh pr create \
                    --head "${{ steps.commit.outputs.branch }}" \
                    --base master \
                    --title "chore(data): update compat data for Gutenberg ${{ steps.tag.outputs.tag }}" \
                    --body "Automated update of compatibility data for Gutenberg ${{ steps.tag.outputs.tag }}." \
                    --reviewer ravinderk
