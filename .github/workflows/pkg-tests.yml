name: '[NPM Package] Tests'

on:
    pull_request:
        paths:
            - 'projects/npm-packages/**'
    push:
        branches:
            - master
            - develop
        paths:
            - 'projects/npm-packages/**'

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run pkg:test

            - name: Type check
              run: npm run typecheck --workspace=projects/npm-packages
